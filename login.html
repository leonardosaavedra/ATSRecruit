<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - 3R Laboral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* 1. Imagen de fondo de reclutamiento */
            background-image: url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=1920&auto=format&fit=crop'); /* Imagen de ejemplo profesional */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantiene la imagen fija al hacer scroll */
            
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* Necesario para el pseudo-elemento */
            z-index: 0;
        }

        /* 2. Capa traslúcida con el degradado original */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Degradado original convertido a RGBA (85% de opacidad) */
            background: linear-gradient(135deg, rgba(13, 110, 253, 0.85) 0%, rgba(17, 0, 94, 0.85) 100%);
            z-index: -1; /* Coloca la capa detrás del contenido (tarjeta) */
        }

        /* Ajuste para asegurar que la tarjeta esté centrada y sobre la capa */
        body > div {
            z-index: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px; /* Margen para móviles */
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            background-color: rgba(255, 255, 255, 0.95); /* Tarjeta ligeramente traslúcida también */
            backdrop-filter: blur(5px); /* Efecto de desenfoque detrás de la tarjeta */
        }

        .btn-login {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: bold;
        }
        
        /* Estilo para el estado cargando del botón */
        .btn-login:disabled {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div>
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">3R LABORAL</h3>
                <p class="text-muted small">Gestión de Talento Humano</p>
            </div>

            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label small fw-bold">USUARIO / EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="email" id="userInput" class="form-control bg-light border-start-0" placeholder="correo@ejemplo.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">CONTRASEÑA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="passInput" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="btnIngresar" class="btn btn-primary w-100 btn-login shadow-sm">
                    INGRESAR AL PANEL <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>

            <div id="errorMessage" class="alert alert-danger mt-3 d-none small text-center py-2">
                Credenciales incorrectas o sin permisos.
            </div>
        </div>
        <div class="card-footer bg-light border-0 py-3 text-center">
            <small class="text-muted">Sistema Seguro v2.0 - 2026</small>
        </div>
    </div>
</div>

<script type="module">
    import { loginUsuario } from './js/auth.js';

    const form = document.getElementById('formLogin');
    const btn = document.getElementById('btnIngresar');
    const errorMsg = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verificando...';
        errorMsg.classList.add('d-none');

        const email = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;

        try {
            await loginUsuario(email, pass);
        } catch (error) {
            console.error(error);
            errorMsg.innerText = "Error de conexión o credenciales.";
            errorMsg.classList.remove('d-none');
        } finally {
            // Esto SIEMPRE se ejecuta, falle o no el login
            // Si no redirigió, reactivamos el botón
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = 'INGRESAR AL PANEL <i class="fas fa-sign-in-alt ms-2"></i>';
            }, 1000);
        }
    });
</script>

</body>
</html>
