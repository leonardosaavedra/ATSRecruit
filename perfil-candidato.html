<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Profesional | 3R Laboral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
    :root {
        --azul: #0D3B66;
        --azul-claro: #185FA5;
        --naranja: #F77F00;
        --gris: #F5F7FA;
        --gris-medio: #E8ECF0;
        --texto: #1a1a2e;
        --texto-muted: #5a6a7a;
        --dark-nav: #0f1923;
        --dark-border: rgba(255,255,255,0.07);
        --radius: 12px;
        --radius-lg: 16px;
        --sombra: 0 2px 16px rgba(13,59,102,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: 'DM Sans', sans-serif;
        background: #f0f2f5;
        color: var(--texto);
        display: flex; flex-direction: column; min-height: 100vh;
    }
    main { flex: 1; }

    /* ── NAVBAR DARK ── */
    .pf-navbar {
        background: var(--dark-nav);
        padding: 0; position: sticky; top: 0; z-index: 1000;
        border-bottom: 1px solid var(--dark-border);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .pf-navbar-inner {
        max-width: 1100px; margin: 0 auto; padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        height: 60px;
    }
    .pf-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .pf-brand-icon {
        width: 34px; height: 34px;
        background: linear-gradient(135deg, var(--naranja), #ff6b00);
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 13px; color: white; letter-spacing: -1px;
    }
    .pf-brand-name {
        font-family: 'Playfair Display', serif;
        font-size: 15px; font-weight: 700; color: white; line-height: 1.1; display: block;
    }
    .pf-brand-sub {
        font-size: 9.5px; color: rgba(255,255,255,0.4);
        text-transform: uppercase; letter-spacing: 1.5px; display: block;
    }
    .pf-nav-right { display: flex; align-items: center; gap: 10px; }
    .pf-user-pill {
        display: flex; align-items: center; gap: 8px;
        background: rgba(255,255,255,0.07);
        border: 1px solid var(--dark-border);
        border-radius: 30px; padding: 5px 14px 5px 8px;
        color: rgba(255,255,255,0.75); font-size: 13px;
    }
    .pf-user-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #4caf87;
    }
    .btn-pf-logout {
        display: flex; align-items: center; gap: 6px;
        background: rgba(220,53,69,0.15);
        border: 1px solid rgba(220,53,69,0.3);
        color: #ff6b6b; padding: 6px 14px; border-radius: 9px;
        font-size: 13px; font-weight: 600; cursor: pointer;
        transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .btn-pf-logout:hover { background: rgba(220,53,69,0.28); color: #ff4757; }

    /* ── SUBHEADER ── */
    .pf-subheader {
        background: #1a2535;
        border-bottom: 1px solid var(--dark-border); padding: 10px 0;
    }
    .pf-subheader-inner {
        max-width: 1100px; margin: 0 auto; padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .pf-page-title {
        font-family: 'Playfair Display', serif;
        font-size: 17px; font-weight: 700; color: white;
        display: flex; align-items: center; gap: 10px;
    }
    .pf-page-title-icon {
        width: 28px; height: 28px; border-radius: 7px;
        background: rgba(247,127,0,0.2);
        display: flex; align-items: center; justify-content: center;
        color: var(--naranja); font-size: 13px;
    }
    .pf-breadcrumb { font-size: 12px; color: rgba(255,255,255,0.35); }
    .pf-breadcrumb span { color: rgba(255,255,255,0.6); }

    /* ── CONTENIDO ── */
    .pf-content { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── PANEL ── */
    .pf-panel {
        background: white; border-radius: var(--radius-lg);
        border: 1px solid var(--gris-medio);
        box-shadow: var(--sombra); overflow: hidden; margin-bottom: 20px;
    }
    .pf-panel-header {
        padding: 18px 24px; border-bottom: 1px solid var(--gris-medio);
        display: flex; align-items: center; gap: 12px;
    }
    .pf-panel-num {
        width: 28px; height: 28px; border-radius: 8px;
        background: linear-gradient(135deg, var(--azul), var(--azul-claro));
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .pf-panel-title {
        font-size: 14px; font-weight: 700; color: var(--azul);
        text-transform: uppercase; letter-spacing: 0.8px;
    }
    .pf-panel-body { padding: 24px; }

    /* ── FORM FIELDS ── */
    .pf-field-label {
        font-size: 10.5px; font-weight: 700; color: var(--texto-muted);
        text-transform: uppercase; letter-spacing: 0.8px;
        margin-bottom: 6px; display: block;
    }
    .form-control, .form-select {
        border: 1.5px solid var(--gris-medio) !important;
        border-radius: 9px !important;
        font-family: 'DM Sans', sans-serif !important;
        font-size: 14px !important; color: var(--texto) !important;
        background: var(--gris) !important;
        padding: 10px 14px !important;
        transition: all 0.2s !important;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--azul-claro) !important;
        background: white !important;
        box-shadow: 0 0 0 3px rgba(24,95,165,0.1) !important;
        outline: none !important;
    }
    .form-control[readonly] {
        opacity: 0.7 !important; cursor: not-allowed !important;
    }
    .form-control.bg-light { background: var(--gris) !important; }
    textarea.form-control { resize: vertical !important; min-height: 80px !important; }

    /* Input group editar nombre */
    .input-group .form-control { border-radius: 9px 0 0 9px !important; }
    .input-group .btn {
        border-radius: 0 9px 9px 0 !important;
        border: 1.5px solid var(--gris-medio) !important;
        border-left: none !important;
        background: white !important; color: var(--azul) !important;
        font-size: 13px !important; padding: 0 14px !important;
        transition: all 0.2s !important;
    }
    .input-group .btn:hover { background: var(--azul) !important; color: white !important; border-color: var(--azul) !important; }
    .input-group .btn.btn-success { background: #198754 !important; color: white !important; border-color: #198754 !important; }

    /* ── CV UPLOAD ── */
    .cv-upload-box {
        background: var(--gris); border-radius: 12px;
        border: 1.5px dashed var(--gris-medio);
        padding: 20px 24px;
        display: flex; align-items: center; gap: 16px;
    }
    .cv-icon {
        width: 44px; height: 44px; border-radius: 10px;
        background: rgba(220,53,69,0.08);
        display: flex; align-items: center; justify-content: center;
        color: #dc3545; font-size: 20px; flex-shrink: 0;
    }
    .cv-label { font-size: 13px; font-weight: 600; color: var(--texto); margin-bottom: 2px; }
    .cv-status { font-size: 12px; color: var(--texto-muted); }
    .cv-upload-box .form-control {
        background: white !important;
        border-style: solid !important;
        font-size: 13px !important;
    }

    /* ── SWITCH ── */
    .form-check-input:checked { background-color: var(--azul) !important; border-color: var(--azul) !important; }
    .form-check-label { font-size: 13.5px; font-weight: 600; color: var(--texto); }

    /* ── BOTÓN GUARDAR ── */
    .btn-pf-save {
        width: 100%; padding: 14px;
        background: var(--azul); color: white; border: none;
        border-radius: 11px; font-family: 'DM Sans', sans-serif;
        font-size: 15px; font-weight: 700; cursor: pointer;
        transition: all 0.25s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        letter-spacing: 0.3px; margin-top: 8px;
    }
    .btn-pf-save:hover { background: var(--azul-claro); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,59,102,0.25); }

    /* ── FOOTER DARK ── */
    .pf-footer {
        background: var(--dark-nav);
        border-top: 1px solid var(--dark-border);
        padding: 18px 24px;
        display: flex; align-items: center; justify-content: space-between;
        font-size: 12.5px; color: rgba(255,255,255,0.35);
    }
    .pf-footer a { color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .pf-footer a:hover { color: rgba(255,255,255,0.7); }
    .pf-server-badge {
        display: flex; align-items: center; gap: 6px;
        background: rgba(25,135,84,0.15);
        border: 1px solid rgba(25,135,84,0.3);
        color: #4caf87; padding: 4px 12px; border-radius: 20px;
        font-size: 11.5px; font-weight: 600;
    }
    .pf-server-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #4caf87; animation: pfPulse 2s infinite;
    }
    @keyframes pfPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── RESPONSIVE ── */
    @media(max-width: 768px) {
        .pf-content { padding: 18px 16px 40px; }
        .pf-footer { flex-direction: column; gap: 10px; text-align: center; }
    }
    </style>
</head>
<body>

<!-- ── NAVBAR DARK ── -->
<nav class="pf-navbar">
    <div class="pf-navbar-inner">
        <a class="pf-brand" href="index.html">
            <div class="pf-brand-icon">3R</div>
            <div>
                <span class="pf-brand-name">3R Laboral</span>
                <span class="pf-brand-sub">Mi Perfil</span>
            </div>
        </a>
        <div class="pf-nav-right">
            <div class="pf-user-pill">
                <div class="pf-user-dot"></div>
                <span id="userNameNav">Candidato</span>
            </div>
            <button id="btnCerrarSesion" class="btn-pf-logout">
                <i class="fas fa-right-from-bracket"></i> Salir
            </button>
        </div>
    </div>
</nav>

<!-- ── SUBHEADER ── -->
<div class="pf-subheader">
    <div class="pf-subheader-inner">
        <div class="pf-page-title">
            <div class="pf-page-title-icon"><i class="fas fa-user-circle"></i></div>
            <span>Mi Perfil Profesional</span>
        </div>
        <div class="pf-breadcrumb">
            3R Laboral › <span>Perfil</span>
        </div>
    </div>
</div>

<!-- ── CONTENIDO ── -->
<main>
<div class="pf-content">
<form id="formPerfilMaestro">

    <!-- 1. DATOS PERSONALES -->
    <div class="pf-panel">
        <div class="pf-panel-header">
            <div class="pf-panel-num">1</div>
            <div class="pf-panel-title">Datos Personales</div>
        </div>
        <div class="pf-panel-body">
            <div class="row g-3">

                <div class="col-md-12">
                    <label class="pf-field-label">Nombre completo</label>
                    <div class="input-group">
                        <input type="text" name="nombre" id="inputNombre" class="form-control" readonly required>
                        <button class="btn" type="button" id="btnEditarNombre" title="Modificar nombre">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="pf-field-label">Correo electrónico</label>
                    <input type="email" name="correo" class="form-control" readonly required>
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">WhatsApp</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="10 dígitos" required>
                </div>
                <div class="col-md-4">
                    <label class="pf-field-label">Edad</label>
                    <input type="number" name="edad" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="pf-field-label">Sexo</label>
                    <select name="sexo" class="form-select" required>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="pf-field-label">Estado Civil</label>
                    <select name="estado_civil" class="form-select" required>
                        <option value="Soltero/a">Soltero/a</option>
                        <option value="Casado/a">Casado/a</option>
                        <option value="Unión Libre">Unión Libre</option>
                        <option value="Divorciado/a">Divorciado/a</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">Estado</label>
                    <input type="text" name="estado" class="form-control" placeholder="Ej. Querétaro" required>
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">Municipio</label>
                    <input type="text" name="municipio" class="form-control" placeholder="Ej. El Marqués" required>
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">Licencia de Manejo</label>
                    <select name="licencia" class="form-select" required>
                        <option value="Sin licencia">Sin licencia</option>
                        <option value="Licencia A">Licencia A</option>
                        <option value="Licencia B">Licencia B</option>
                        <option value="Licencia C">Licencia C</option>
                        <option value="Licencia Federal">Licencia Federal</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">¿Qué vehículo maneja?</label>
                    <select name="vehiculo" class="form-select">
                        <option value="Ninguno">Ninguno</option>
                        <option value="Auto">Auto</option>
                        <option value="Motocicleta">Motocicleta</option>
                        <option value="Montacargas">Montacargas</option>
                        <option value="Camion/Trailer">Camión / Tráiler</option>
                    </select>
                </div>

            </div>
        </div>
    </div>

    <!-- 2. ESTUDIOS E IDIOMAS -->
    <div class="pf-panel">
        <div class="pf-panel-header">
            <div class="pf-panel-num">2</div>
            <div class="pf-panel-title">Estudios e Idiomas</div>
        </div>
        <div class="pf-panel-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="pf-field-label">Escolaridad</label>
                    <select name="escolaridad" class="form-select">
                        <option value="Secundaria">Secundaria</option>
                        <option value="Bachillerato">Bachillerato</option>
                        <option value="Licenciatura">Licenciatura</option>
                        <option value="Ingeniería">Ingeniería</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="pf-field-label">Carrera / Oficio</label>
                    <input type="text" name="carrera" class="form-control" placeholder="Ej. Ing. Civil">
                </div>
                <div class="col-md-4">
                    <label class="pf-field-label">Idioma y Nivel</label>
                    <div class="input-group">
                        <input type="text" name="idioma_nombre" class="form-control" placeholder="Idioma" style="border-radius:9px 0 0 9px !important;">
                        <select name="idioma_nivel" class="form-select" style="border-radius:0 9px 9px 0 !important;border-left:none !important;">
                            <option value="Ninguno">Nivel...</option>
                            <option value="Basico">Básico</option>
                            <option value="Intermedio">Intermedio</option>
                            <option value="Experto">Experto</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. EXPERIENCIA LABORAL -->
    <div class="pf-panel">
        <div class="pf-panel-header">
            <div class="pf-panel-num">3</div>
            <div class="pf-panel-title">Última Experiencia Laboral</div>
        </div>
        <div class="pf-panel-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="pf-field-label">Empresa</label>
                    <input type="text" name="exp_empresa1" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="pf-field-label">Puesto</label>
                    <input type="text" name="exp_puesto1" class="form-control">
                </div>
                <div class="col-12">
                    <label class="pf-field-label">Descripción de actividades</label>
                    <textarea name="exp_desc1" class="form-control" rows="3" placeholder="Resumen de tus funciones..."></textarea>
                </div>
                <div class="col-md-3">
                    <label class="pf-field-label">Mes ingreso</label>
                    <select name="mes_in" class="form-select">
                        <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
                        <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
                        <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="pf-field-label">Año ingreso</label>
                    <input type="number" name="anio_in" class="form-control" placeholder="Ej. 2022">
                </div>
                <div class="col-md-6 d-flex align-items-end pb-1">
                    <div class="form-check form-switch ms-1">
                        <input class="form-check-input" type="checkbox" id="checkActual" name="actualmente_laborando">
                        <label class="form-check-label" for="checkActual">Sigo laborando aquí</label>
                    </div>
                </div>
                <div id="divSalida" class="row g-3 col-12 m-0 p-0">
                    <div class="col-md-3">
                        <label class="pf-field-label">Mes salida</label>
                        <select name="mes_out" class="form-select">
                            <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
                            <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
                            <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="pf-field-label">Año salida</label>
                        <input type="number" name="anio_out" class="form-control" placeholder="Ej. 2024">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. INFORMACIÓN ADICIONAL -->
    <div class="pf-panel">
        <div class="pf-panel-header">
            <div class="pf-panel-num">4</div>
            <div class="pf-panel-title">Información Adicional</div>
        </div>
        <div class="pf-panel-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="pf-field-label">¿Tiene alguna discapacidad?</label>
                    <select id="selectDiscapacidad" name="tiene_discapacidad" class="form-select">
                        <option value="No">No</option>
                        <option value="Si">Sí</option>
                    </select>
                </div>
                <div class="col-md-6 d-none" id="wrapperDiscapacidad">
                    <label class="pf-field-label">Especifique discapacidad</label>
                    <input type="text" name="detalle_discapacidad" class="form-control" placeholder="Ej. Motriz">
                </div>
            </div>
        </div>
    </div>

    <!-- CV UPLOAD -->
    <div class="pf-panel">
        <div class="pf-panel-header">
            <div class="pf-panel-num"><i class="fas fa-file-pdf" style="font-size:13px;"></i></div>
            <div class="pf-panel-title">Currículum Vitae (PDF)</div>
        </div>
        <div class="pf-panel-body" style="display:none;">
            <div class="cv-upload-box">
                <div class="cv-icon"><i class="fas fa-file-pdf"></i></div>
                <div style="flex:1;">
                    <div class="cv-label">Subir archivo PDF</div>
                    <div class="cv-status" id="cvStatus">No se ha detectado un CV.</div>
                    <input type="file" id="inputCV" class="form-control mt-2" accept=".pdf">
                </div>
            </div>
        </div>
    </div>

    <!-- BOTÓN GUARDAR -->
    <button type="submit" id="btnGuardarPerfil" class="btn-pf-save">
        <i class="fas fa-save"></i> Guardar y Actualizar Perfil
    </button>

</form>
</div>
</main>

<!-- ── FOOTER DARK ── -->
<footer class="pf-footer">
    <div style="display:flex;align-items:center;gap:20px;">
        <span>© 2026 3R Laboral</span>
        <a href="index.html"><i class="fas fa-arrow-left" style="margin-right:5px;"></i>Ver vacantes</a>
    </div>
    <div class="pf-server-badge">
        <div class="pf-server-dot"></div> Servidor Online
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./js/perfil-logic.js"></script>
<script>
    document.getElementById('btnEditarNombre').addEventListener('click', function() {
        const input = document.getElementById('inputNombre');
        const icon = this.querySelector('i');
        if (input.readOnly) {
            input.readOnly = false;
            input.classList.remove('bg-light');
            input.style.background = 'white';
            input.focus();
            icon.classList.replace('fa-edit', 'fa-check');
            this.classList.add('btn-success');
        } else {
            input.readOnly = true;
            input.style.background = '';
            icon.classList.replace('fa-check', 'fa-edit');
            this.classList.remove('btn-success');
        }
    });

    document.getElementById('checkActual').addEventListener('change', function() {
        document.getElementById('divSalida').classList.toggle('d-none', this.checked);
    });

    document.getElementById('selectDiscapacidad').addEventListener('change', function() {
        document.getElementById('wrapperDiscapacidad').classList.toggle('d-none', this.value !== 'Si');
    });
</script>
</body>
</html>
