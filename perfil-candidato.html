<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .section-title { border-left: 5px solid #0d6efd; padding-left: 15px; margin-bottom: 20px; }
        .badge-status { border-radius: 20px; padding: 5px 12px; font-size: 0.7rem; }
        .bg-custom-light { background-color: #f8f9fa; }
        .sticky-panel { position: sticky; top: 20px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">3R LABORAL</a>
        <div class="d-flex align-items-center">
            <span id="userNameNav" class="text-white me-3 small"></span>
            <button id="btnCerrarSesion" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body p-4">
                    <h4 class="section-title fw-bold text-primary">MI PERFIL PROFESIONAL</h4>
                    <form id="formPerfilMaestro">
                        
                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold border-bottom pb-2 text-secondary">1. DATOS PERSONALES</h6>
                            
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">NOMBRE COMPLETO</label>
                                <div class="input-group">
                                    <input type="text" name="nombre" id="inputNombre" class="form-control bg-light" readonly required>
                                    <button class="btn btn-outline-primary" type="button" id="btnEditarNombre" title="Modificar nombre">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">CORREO ELECTRÓNICO</label>
                                <input type="email" name="correo" class="form-control bg-light" readonly required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">WHATSAPP</label>
                                <input type="tel" name="whatsapp" class="form-control" placeholder="10 dígitos" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">EDAD</label>
                                <input type="number" name="edad" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">SEXO</label>
                                <select name="sexo" class="form-select" required>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Femenino">Femenino</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">ESTADO CIVIL</label>
                                <select name="estado_civil" class="form-select" required>
                                    <option value="Soltero/a">Soltero/a</option>
                                    <option value="Casado/a">Casado/a</option>
                                    <option value="Unión Libre">Unión Libre</option>
                                    <option value="Divorciado/a">Divorciado/a</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">ESTADO</label>
                                <input type="text" name="estado" class="form-control" placeholder="Ej. Querétaro" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">MUNICIPIO</label>
                                <input type="text" name="municipio" class="form-control" placeholder="Ej. El Marqués" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">LICENCIA DE MANEJO</label>
                                <select name="licencia" class="form-select" required>
                                    <option value="Sin licencia">Sin licencia</option>
                                    <option value="Licencia A">Licencia A</option>
                                    <option value="Licencia B">Licencia B</option>
                                    <option value="Licencia C">Licencia C</option>
                                    <option value="Licencia Federal">Licencia Federal</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">¿QUÉ VEHÍCULO MANEJA?</label>
                                <select name="vehiculo" class="form-select">
                                    <option value="Ninguno">Ninguno</option>
                                    <option value="Auto">Auto</option>
                                    <option value="Motocicleta">Motocicleta</option>
                                    <option value="Montacargas">Montacargas</option>
                                    <option value="Camion/Trailer">Camión / Tráiler</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold border-bottom pb-2 text-secondary">2. ESTUDIOS E IDIOMAS</h6>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">ESCOLARIDAD</label>
                                <select name="escolaridad" class="form-select">
                                    <option value="Secundaria">Secundaria</option>
                                    <option value="Bachillerato">Bachillerato</option>
                                    <option value="Licenciatura">Licenciatura</option>
                                    <option value="Ingeniería">Ingeniería</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">CARRERA / OFICIO</label>
                                <input type="text" name="carrera" class="form-control" placeholder="Ej. Ing. Civil">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">IDIOMA Y NIVEL</label>
                                <div class="input-group">
                                    <input type="text" name="idioma_nombre" class="form-control" placeholder="Idioma">
                                    <select name="idioma_nivel" class="form-select">
                                        <option value="Ninguno">Nivel...</option>
                                        <option value="Basico">Básico</option>
                                        <option value="Intermedio">Intermedio</option>
                                        <option value="Experto">Experto</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold border-bottom pb-2 text-secondary">3. ÚLTIMA EXPERIENCIA LABORAL</h6>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">EMPRESA</label>
                                <input type="text" name="exp_empresa1" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">PUESTO</label>
                                <input type="text" name="exp_puesto1" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">DESCRIPCIÓN DE ACTIVIDADES</label>
                                <textarea name="exp_desc1" class="form-control" rows="2" placeholder="Resumen de tus funciones..."></textarea>
                            </div>
                            
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">MES INGRESO</label>
                                <select name="mes_in" class="form-select">
                                    <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
                                    <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
                                    <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
                                    <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
                                    <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
                                    <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">AÑO INGRESO</label>
                                <input type="number" name="anio_in" class="form-control" placeholder="Ej. 2022">
                            </div>
                            <div class="col-md-6 d-flex align-items-end pb-2">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="checkActual" name="actualmente_laborando">
                                    <label class="form-check-label fw-bold" for="checkActual">Sigo laborando aquí</label>
                                </div>
                            </div>

                            <div id="divSalida" class="row g-3 col-12 m-0 p-0">
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">MES SALIDA</label>
                                    <select name="mes_out" class="form-select">
                                        <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
                                        <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
                                        <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
                                        <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
                                        <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
                                        <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">AÑO SALIDA</label>
                                    <input type="number" name="anio_out" class="form-control" placeholder="Ej. 2024">
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold border-bottom pb-2 text-secondary">4. INFORMACIÓN ADICIONAL</h6>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">¿TIENE ALGUNA DISCAPACIDAD?</label>
                                <select id="selectDiscapacidad" name="tiene_discapacidad" class="form-select">
                                    <option value="No">No</option>
                                    <option value="Si">Sí</option>
                                </select>
                            </div>
                            <div class="col-md-6 d-none" id="wrapperDiscapacidad">
                                <label class="form-label small fw-bold">ESPECIFIQUE DISCAPACIDAD</label>
                                <input type="text" name="detalle_discapacidad" class="form-control" placeholder="Ej. Motriz">
                            </div>
                        </div>

                        <div class="mb-4 p-3 bg-custom-light rounded border">
                            <h6 class="fw-bold text-primary"><i class="fas fa-file-pdf me-2"></i>CURRICULUM VITAE (PDF)</h6>
                            <input type="file" id="inputCV" class="form-control" accept=".pdf">
                            <div id="cvStatus" class="small mt-2 text-muted">No se ha detectado un CV.</div>
                        </div>

                        <button type="submit" id="btnGuardarPerfil" class="btn btn-primary w-100 py-3 fw-bold shadow">GUARDAR Y ACTUALIZAR PERFIL</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 sticky-panel">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-primary mb-4"><i class="fas fa-briefcase me-2"></i>MIS POSTULACIONES</h5>
                    <div id="listaPostulaciones" class="list-group list-group-flush">
                        <div class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script type="module" src="./js/perfil-logic.js"></script>

<script>
    // Lógica para permitir editar el nombre
    document.getElementById('btnEditarNombre').addEventListener('click', function() {
        const input = document.getElementById('inputNombre');
        const icon = this.querySelector('i');
        
        if (input.readOnly) {
            input.readOnly = false;
            input.classList.remove('bg-light');
            input.focus();
            icon.classList.replace('fa-edit', 'fa-check');
            this.classList.replace('btn-outline-primary', 'btn-success');
        } else {
            input.readOnly = true;
            input.classList.add('bg-light');
            icon.classList.replace('fa-check', 'fa-edit');
            this.classList.replace('btn-success', 'btn-outline-primary');
        }
    });

    // Lógica visual para fechas laborales
    document.getElementById('checkActual').addEventListener('change', function() {
        document.getElementById('divSalida').classList.toggle('d-none', this.checked);
    });

    // Lógica visual para discapacidad
    document.getElementById('selectDiscapacidad').addEventListener('change', function() {
        document.getElementById('wrapperDiscapacidad').classList.toggle('d-none', this.value !== 'Si');
    });
</script>
</body>
</html>
