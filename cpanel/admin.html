<!DOCTYPE html>
<html lang="es">
<head>
    <script type="module" src="../js/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | 3R Laboral</title>

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">

    <style>
         /* ── CSS LOGO NAV Y FOOTER ── */

        .brand-logo img{
            height: 34px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .brand-logo img{
            height: 34px;
            width: auto;
            transition: transform .2s ease;
        }

        .brand-logo img:hover{
            transform: scale(1.03);
        }   
    </style>
</head>
<body class="admin-body">

<!-- ── NAVBAR DARK ── -->
<nav class="admin-navbar">
    <div class="admin-navbar-inner">

        <a class="admin-brand" href="#">
            <div class="brand-logo"><img src="../img/logo3rlaboral-white.png" alt="3R Laboral">            </div>
        </a>

        <div class="admin-nav-center">
            <button class="admin-nav-tab active" onclick="cambiarTab('vacantes', this)">
                <i class="fas fa-briefcase"></i> Gestión de Vacantes
            </button>
            <button class="admin-nav-tab" onclick="cambiarTab('usuarios', this)">
                <i class="fas fa-user-gear"></i> Usuarios y Roles
            </button>
        </div>

        <div class="admin-nav-right">
            <div class="admin-user-pill">
                <div class="admin-user-avatar">AD</div>
                Admin
            </div>
            <button class="btn-logout" id="btnCerrarSesion">
                <i class="fas fa-right-from-bracket"></i> Salir
            </button>
        </div>

    </div>
</nav>

<!-- ── SUBHEADER ── -->
<div class="admin-subheader">
    <div class="admin-subheader-inner">
        <div class="admin-page-title">
            <div class="admin-page-title-icon"><i class="fas fa-briefcase" id="subheaderIcon"></i></div>
            <span id="pageTitle">Gestión de Vacantes</span>
        </div>
        <div class="admin-breadcrumb">
            3R Laboral › Admin › <span id="pageBreadcrumb">Vacantes</span>
        </div>
    </div>
</div>

<!-- ── CONTENIDO ── -->
<main class="admin-main">
<div class="admin-content">

    <!-- TAB: VACANTES -->
    <div class="admin-tab-section active" id="tab-vacantes">
        <div class="row g-4">

            <!-- FORMULARIO PUBLICAR -->
            <div class="col-md-5">
                <div class="admin-panel">
                    <div class="admin-panel-header">
                        <div class="admin-panel-title">
                            <i class="fas fa-plus-circle"></i> Publicar vacante
                        </div>
                    </div>
                    <div class="admin-panel-body">
                        <form id="formNuevaVacante">
                            <div class="mb-3">
                                <label class="admin-field-label">Nombre de la vacante</label>
                                <input type="text" name="titulo" class="form-control" placeholder="Ej: Auxiliar Contable" required>
                            </div>
                            <div class="mb-3">
                                <label class="admin-field-label">Ubicación</label>
                                <input type="text" name="ubicacion" class="form-control" placeholder="Querétaro, Qro." required>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="admin-field-label">Salario desde</label>
                                    <input type="number" name="salarioDesde" class="form-control" placeholder="12000" required>
                                </div>
                                <div class="col-6">
                                    <label class="admin-field-label">Salario hasta</label>
                                    <input type="number" name="salarioHasta" class="form-control" placeholder="15000" required>
                                </div>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="admin-field-label">Jornada</label>
                                    <select name="jornada" class="form-select">
                                        <option value="Tiempo Completo">Tiempo Completo</option>
                                        <option value="Medio Tiempo">Medio Tiempo</option>
                                        <option value="Por Proyecto">Por Proyecto</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="admin-field-label">Horario</label>
                                    <select name="horario" class="form-select">
                                        <option value="Lunes a Viernes">Lunes a Viernes</option>
                                        <option value="Lunes a Sábado">Lunes a Sábado</option>
                                        <option value="Fines de Semana">Fines de Semana</option>
                                        <option value="Turnos Rotativos">Turnos Rotativos</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="admin-field-label">Descripción de la vacante</label>
                                <div id="editor-registro" style="height:200px;" class="mb-3">
                                    <div id="editor-container" style="height:300px;"></div>
                                    <input type="hidden" name="descripcion" id="descripcion-input">
                                </div>
                            </div>
                            <button type="submit" class="btn-admin-primary">
                                <i class="fas fa-paper-plane"></i> Publicar ahora
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- TABLA VACANTES -->
            <div class="col-md-7">
                <div class="admin-panel">
                    <div class="admin-panel-header">
                        <div class="admin-panel-title">
                            <i class="fas fa-list"></i> Vacantes publicadas
                        </div>
                        <button class="btn-admin-icon" id="btnRefrescarVacantes" title="Refrescar">
                            <i class="fas fa-rotate"></i>
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Título</th>
                                    <th class="text-center">Postulados</th>
                                    <th class="text-center">Estado</th>
                                    <th class="text-end">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- TAB: USUARIOS -->
    <div class="admin-tab-section" id="tab-usuarios">
        <div class="row g-4">

            <!-- FORMULARIO USUARIO -->
            <div class="col-md-4">
                <div class="admin-panel">
                    <div class="admin-panel-header">
                        <div class="admin-panel-title">
                            <i class="fas fa-user-plus"></i> Registrar usuario
                        </div>
                    </div>
                    <div class="admin-panel-body">
                        <form id="formNuevoUsuario">
                            <div class="mb-3">
                                <label class="admin-field-label">Nombre completo</label>
                                <input type="text" id="userName" class="form-control" placeholder="Nombre completo" required>
                            </div>
                            <div class="mb-3">
                                <label class="admin-field-label">Correo electrónico</label>
                                <input type="email" id="userEmail" class="form-control" placeholder="correo@3rlaboral.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="admin-field-label">Contraseña inicial</label>
                                <input type="password" id="userPass" class="form-control" placeholder="Mínimo 6 caracteres" required>
                            </div>
                            <div class="mb-4">
                                <label class="admin-field-label">Rol</label>
                                <select id="userRole" class="form-select">
                                    <option value="reclutador">Reclutador</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-admin-success">
                                <i class="fas fa-user-check"></i> Guardar usuario
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- TABLA USUARIOS -->
            <div class="col-md-8">
                <div class="admin-panel">
                    <div class="admin-panel-header">
                        <div class="admin-panel-title">
                            <i class="fas fa-users"></i> Usuarios con acceso
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Correo</th>
                                    <th>Rol</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaUsuariosBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
</main>

<!-- MODAL EDITAR USUARIO -->
<div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="admin-modal-header">
                <div class="admin-modal-title"><i class="fas fa-user-pen"></i> Editar usuario</div>
                <button class="btn-admin-modal-close" data-bs-dismiss="modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4">
                <form id="formEditarUsuario">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="admin-field-label">Nombre completo</label>
                        <input type="text" id="editUserName" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="admin-field-label">Rol del sistema</label>
                        <select id="editUserRole" class="form-select">
                            <option value="reclutador">Reclutador</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-admin-primary">
                        <i class="fas fa-save"></i> Guardar cambios
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- MODAL EDITAR VACANTE -->
<div class="modal fade" id="modalEditarVacante" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="admin-modal-header">
                <div class="admin-modal-title"><i class="fas fa-pen-to-square"></i> Editar vacante</div>
                <button class="btn-admin-modal-close" data-bs-dismiss="modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4">
                <form id="formEditarVacante">
                    <input type="hidden" id="editVacanteId">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="admin-field-label">Nombre de la vacante</label>
                            <input type="text" id="editVacTitulo" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="admin-field-label">Ubicación</label>
                            <input type="text" id="editVacUbicacion" class="form-control" required>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="admin-field-label">Salario desde</label>
                            <input type="number" id="editVacSalarioDesde" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="admin-field-label">Salario hasta</label>
                            <input type="number" id="editVacSalarioHasta" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="admin-field-label">Estado</label>
                            <select id="editVacEstado" class="form-select">
                                <option value="Activa">Activa</option>
                                <option value="Pausada">Pausada</option>
                                <option value="Cerrada">Cerrada</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="admin-field-label">Jornada</label>
                            <select id="editVacJornada" class="form-select">
                                <option value="Tiempo Completo">Tiempo Completo</option>
                                <option value="Medio Tiempo">Medio Tiempo</option>
                                <option value="Por Proyecto">Por Proyecto</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="admin-field-label">Horario</label>
                            <select id="editVacHorario" class="form-select">
                                <option value="Lunes a Viernes">Lunes a Viernes</option>
                                <option value="Lunes a Sábado">Lunes a Sábado</option>
                                <option value="Fines de Semana">Fines de Semana</option>
                                <option value="Turnos Rotativos">Turnos Rotativos</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="admin-field-label">Descripción de la vacante</label>
                        <div id="editor-edicion" style="height:200px;">
                            <div id="editor-container" style="height:300px;"></div>
                            <input type="hidden" name="descripcion" id="descripcion-input">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn-admin-primary" style="width:auto;padding:10px 24px;">
                            <i class="fas fa-save"></i> Guardar cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ── FOOTER DARK ── -->
<footer class="admin-footer">
    <div style="display:flex;align-items:center;gap:20px;">
        <span>© 2026 3R Laboral</span>
        <a href="../index.html"><i class="fas fa-house" style="margin-right:5px;"></i>Portal público</a>
        <a href="#"><i class="fas fa-headset" style="margin-right:5px;"></i>Soporte técnico</a>
    </div>
    <div class="admin-server-badge">
        <div class="admin-server-dot"></div> Servidor Online
    </div>
</footer>

<!-- Tab switching -->
<script>
function cambiarTab(tab, btn) {
    document.querySelectorAll('.admin-tab-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.admin-nav-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    const titles = { vacantes: 'Gestión de Vacantes', usuarios: 'Usuarios y Roles' };
    const icons  = { vacantes: 'fas fa-briefcase',    usuarios: 'fas fa-user-gear' };
    document.getElementById('pageTitle').textContent = titles[tab];
    document.getElementById('pageBreadcrumb').textContent = tab === 'vacantes' ? 'Vacantes' : 'Usuarios';
    document.getElementById('subheaderIcon').className = icons[tab];
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/admin-logic.js"></script>
</body>
</html>
